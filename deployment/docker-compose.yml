services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: leegoo
      POSTGRES_PASSWORD: leegoo
      POSTGRES_DB: leegoo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leegoo"]
      interval: 5s
      timeout: 5s
      retries: 5
